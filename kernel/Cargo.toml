[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
bootloader_api = {version="0.11.7"}
lazy_static = { version = "1.5.0", features = ["spin_no_std"] }
noto-sans-mono-bitmap = "0.3.0"
x86_64 = "0.15.1"
buddy_system_allocator = "0.11.0"
uart_16550 = "0.3.1"
spinning_top = "0.3.0"
log = "0.4.22"
acpi = "5.0.0"
pic8259 = "0.11.0"

[profile.dev]
panic = "abort"
debug = true

[profile.release]
panic = "abort"

[[bin]]
name = "kernel"
test = false
bench = false
