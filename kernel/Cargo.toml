[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
bootloader_api = {version="0.11.7"}
embedded-graphics = "0.8.1"
lazy_static = { version = "1.5.0", features = ["spin_no_std"] }
noto-sans-mono-bitmap = "0.3.0"
spin = "0.9.8"
uart_16550 = "0.3.1"
x86_64 = "0.15.1"
pic8259 = "0.11.0"
linked_list_allocator = "0.9.0"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[[bin]]
name = "kernel"
test = false
bench = false
